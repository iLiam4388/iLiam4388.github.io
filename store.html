<!DOCTYPE html>
<html>
<head>
<title>Store</title>

<style>

body{

margin:0;

background:
linear-gradient(to bottom,#001133,#000011);

font-family:Verdana;

color:white;

text-align:center;

overflow-x:hidden;
}

/* TOP HEADER */

.topheader{

padding:40px;

background:
linear-gradient(to bottom,#001a55,#000000);

border-bottom:
4px solid cyan;

box-shadow:
0 0 25px cyan;
}

.topheader h1{

font-size:52px;

margin:0;

text-shadow:
0 0 10px white,
0 0 25px cyan;
}

.backbtn{

display:inline-block;

margin-top:20px;

padding:
14px 28px;

background:
linear-gradient(to bottom,#69c7ff,#0066ff);

border-radius:16px;

color:white;

font-size:20px;

font-weight:bold;

text-decoration:none;

box-shadow:
0 0 15px cyan,
0 0 30px #00ffff66;

transition:0.2s;
}

.backbtn:hover{

transform:scale(1.08);

filter:brightness(1.2);
}

/* CARD GRID */

.grid{

display:flex;

justify-content:center;

flex-wrap:wrap;

gap:40px;

padding:50px;
}

/* ITEM CARD */

.card{

width:320px;

background:
linear-gradient(to bottom,#ff9cff,#d100ff);

border-radius:30px;

padding:20px;

border:
4px solid white;

box-shadow:
0 0 25px #ff66ff,
0 0 50px #00ffff55;

transition:0.2s;
}

.card:hover{

transform:
scale(1.04);

box-shadow:
0 0 40px white,
0 0 70px #ff66ff;
}

/* IMAGE */

.card img{

width:100%;

border-radius:18px;

box-shadow:
0 0 20px black;
}

/* TITLE */

.cardtitle{

margin-top:18px;

font-size:30px;

font-weight:bold;

color:white;

text-shadow:
0 0 10px white,
0 0 20px cyan;
}

/* DESCRIPTION */

.description{

margin-top:12px;

font-size:17px;

line-height:1.6;

color:white;
}

/* PRICE */

.price{

margin-top:15px;

font-size:24px;

font-weight:bold;

color:#aaffaa;

text-shadow:
0 0 12px lime;
}

/* BUTTON */

.downloadbtn{

display:inline-block;

margin-top:20px;

padding:
16px 30px;

background:
linear-gradient(to bottom,#66ff99,#00aa44);

border-radius:16px;

color:white;

font-size:22px;

font-weight:bold;

text-decoration:none;

box-shadow:
0 0 15px lime,
0 0 30px cyan;

transition:0.2s;
}

.downloadbtn:hover{

transform:scale(1.08);

filter:brightness(1.2);
}

/* FOOTER */

.footer{

margin-top:40px;

padding:25px;

background:black;

color:cyan;

border-top:
3px solid cyan;

box-shadow:
0 0 20px cyan;
}

</style>
</head>

<body>

<!-- HEADER -->

<div class="topheader">

<h1>STORE</h1>

<a class="backbtn" href="index.html">
← BACK HOME
</a>

</div>

<!-- GRID -->

<div class="grid">

<!-- CARD 1 -->

<div class="card">

<img src="tpu.png">

<div class="cardtitle">
Multi Purpose TPU SQUSHY
</div>

<div class="description">
A flexible TPU squishy cube designed for 3D printing.

Perfect for:

- Fidgeting and stress relief

- DIY projects (feet, supports, grips)

- Testing TPU print settings

Instant download. Ready to print.
</div>

<div class="price">
$1.99
</div>

<a class="downloadbtn"
href="https://negaragent.gumroad.com/l/3dresouces"
target="_blank">

BUY NOW

</a>

</div>

</div>

<!-- FOOTER -->

<div class="footer">

© 2026 iLiam

</div>

</body>
</html>
