<!DOCTYPE html>
<html>
<head>
<title>Downloads - iLiam</title>

<style>
body{
    margin:0;
    font-family:Arial;
    background:linear-gradient(to bottom,#001133,#000011);
    color:white;
}

/* TOP TITLE */

.page-title{
    text-align:center;
    font-size:52px;
    font-weight:bold;
    margin-top:40px;

    color:white;

    text-shadow:
        0 0 10px cyan,
        0 0 20px cyan,
        0 0 40px cyan;
}

/* GO BACK BUTTON */
.top-button{
    text-align:center;
    margin-top:20px;
    margin-bottom:35px;
}

.back-btn{

    text-decoration:none;

    padding:14px 34px;

    border-radius:18px;

    background:
    linear-gradient(
        to bottom,
        #59d7ff,
        #0077ff
    );

    color:white;

    font-weight:bold;

    font-size:20px;

    box-shadow:
        0 0 10px cyan,
        0 0 20px #00aaff;

    transition:0.2s;
}

.back-btn:hover{
    transform:scale(1.05);
}
/* CYAN DIVIDER */

.divider{
    height:4px;

    background:cyan;

    box-shadow:
        0 0 10px cyan,
        0 0 20px cyan;
}

/* DOWNLOAD GRID */

.download-grid{
    display:flex;
    justify-content:center;
    gap:40px;
    flex-wrap:wrap;

    padding:45px;
}

/* MAGENTA CARD */

.download-card{

    width:260px;

    background:
    linear-gradient(
        to bottom,
        #ff8ffb,
        #ff53ff,
        #cc00ff
    );

    border-radius:22px;

    padding:25px;

    text-align:center;

    border:3px solid white;

    box-shadow:
        0 0 18px #ff66ff,
        0 0 40px #ff00ff;
}

/* FILE NAME */
.file-name{

    font-size:30px;

    font-weight:900;

    line-height:1.1;

    letter-spacing:1px;

    color:white;

    margin-top:10px;
    margin-bottom:25px;

    text-shadow:
        0 0 8px white,
        0 0 18px #ffb3ff;

    font-family:Arial, sans-serif;
}
/* DOWNLOAD BUTTON */

.download-btn{

    display:inline-block;

    padding:14px 30px;

    border-radius:18px;

    text-decoration:none;

    background:
    linear-gradient(
        to bottom,
        #5dff84,
        #00c93a
    );

    color:white;

    font-weight:bold;

    box-shadow:
        0 0 10px #00ff66,
        0 0 25px #00ff66;

    transition:0.2s;
}

.download-btn:hover{
    transform:scale(1.06);
}

/* FOOTER */

.footer{
    text-align:center;

    padding:20px;

    margin-top:30px;

    color:#88ffff;

    font-size:14px;
}
</style>

</head>

<body>

<h1 class="page-title">DOWNLOADS</h1>

<div class="top-button">
<div class="top-button">
    <a href="index.html" class="back-btn">
        ← BACK HOME
    </a>
</div>
<div class="divider"></div>

<div class="download-grid">

    <!-- ITEM 1 -->

    <div class="download-card">

        <div class="file-name">
            iLiam Logo 
        </div>

        <a class="download-btn"
        href="files/iliam.blend"
        download>

        DOWNLOAD

        </a>

    </div>

</div>

<div class="divider"></div>

<div class="footer">
© 2026 iLiam
</div>

</body>
</html>
