<!DOCTYPE html>
<html><head><title>Downloads</title><style>
.card {

    width: 320px;

    background:
    linear-gradient(to bottom,#ff9cff,#d100ff);

    border-radius: 28px;

    padding: 20px;

    margin: 30px auto;

    box-shadow:
    0 0 25px #ff66ff,
    0 0 50px #00ffff55;

    border:
    3px solid white;

    transition:0.2s;
}

.card:hover{

    transform:
    scale(1.03);

    box-shadow:
    0 0 40px white,
    0 0 60px #ff66ff;
}

.card img{

    width:100%;

    border-radius:18px;

    box-shadow:
    0 0 20px black;
}

.cardtitle{

    margin-top:15px;

    font-size:28px;

    font-weight:bold;

    color:white;

    text-shadow:
    0 0 10px white,
    0 0 20px cyan;
}

.price{

    margin-top:10px;

    font-size:22px;

    color:#aaffaa;

    text-shadow:
    0 0 10px lime;
}

.downloadbtn{

    display:inline-block;

    margin-top:18px;

    padding:
    14px 28px;

    background:
    linear-gradient(to bottom,#66ff99,#00aa44);

    border-radius:14px;

    color:white;

    font-size:22px;

    font-weight:bold;

    text-decoration:none;

    box-shadow:
    0 0 15px lime,
    0 0 25px cyan;

    transition:0.2s;
}

.downloadbtn:hover{

    transform:scale(1.08);

    filter:brightness(1.2);
}

body{margin:0;background:#00112b;color:white;font-family:Verdana,Arial;text-align:center}
.top{padding:35px;background:#050505;border-bottom:4px solid cyan;box-shadow:0 0 25px cyan}
.box{width:75%;max-width:900px;margin:40px auto;padding:30px;background:linear-gradient(#fff,#ccc);color:black;border-radius:18px;box-shadow:0 0 25px cyan}
a{color:cyan;font-weight:bold}
</style></head><body>
<div class="top"><h1>DOWNLOADS</h1><a href="index.html">← BACK HOME</a></div>
<div class="box"><p>Put ZIP files, Blender files, wallpapers, and assets here.</p></div>
</body></html>
