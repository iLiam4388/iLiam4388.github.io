<!DOCTYPE html>
<html>

<head>
  <title>iLiam 2008</title>

  <style>
    body {
      margin: 0;
      background: linear-gradient(to bottom, #001133, #000000);
      font-family: Verdana;
      color: white;
      text-align: center;
      overflow-x: hidden;
    }

    .topbar {
      background: linear-gradient(to bottom, #66ccff, #0066ff);
      padding: 20px;
      font-size: 50px;
      font-weight: bold;
      text-shadow: 0 0 10px white;
      border-bottom: 5px solid white;
    }

    .subtitle {
      font-size: 20px;
      color: cyan;
      margin-top: 10px;
    }

    .window {
      width: 800px;
      margin: auto;
      margin-top: 40px;
      background: linear-gradient(to bottom, #eeeeee, #bbbbbb);
      border-radius: 25px;
      border: 5px solid white;
      padding: 25px;
      color: black;
      box-shadow: 0 0 40px cyan;
    }

    .button {
      display: inline-block;
      margin: 15px;
      padding: 20px;
      width: 180px;
      border-radius: 20px;
      font-size: 28px;
      font-weight: bold;
      color: white;
      cursor: pointer;
      transition: 0.2s;
      user-select: none;
    }

    .button:hover {
      transform: scale(1.08);
    }

    .blue {
      background: linear-gradient(to bottom, #66ccff, #0055ff);
    }

    .green {
      background: linear-gradient(to bottom, #66ff99, #00aa44);
    }

    .purple {
      background: linear-gradient(to bottom, #ff99ff, #aa00aa);
    }

    .red {
      background: linear-gradient(to bottom, #ff8888, #cc0000);
    }

    .player {
      margin-top: 30px;
      background: #222;
      padding: 20px;
      border-radius: 20px;
      color: white;
      box-shadow: 0 0 20px cyan;
    }

    .bar {
      width: 100%;
      height: 25px;
      background: #555;
      border-radius: 10px;
      overflow: hidden;
      margin-top: 10px;
    }

    .fill {
      width: 45%;
      height: 100%;
      background: linear-gradient(to right, cyan, white);
      animation: move 3s infinite alternate;
    }

    @keyframes move {
      from {
        width: 20%;
      }

      to {
        width: 90%;
      }
    }

    .counter {
      margin-top: 25px;
      color: lime;
      font-size: 22px;
    }

    .footer {
      margin-top: 40px;
      color: gray;
      font-size: 14px;
      margin-bottom: 30px;
    }
  </style>
</head>

<body>

  <div class="topbar">
    iLiam
  </div>

  <div class="subtitle">
    Cool projects, portals, videos, and random internet chaos
  </div>

  <div class="window">

    <h1>WELCOME TO MY WEBSITE</h1>

    <p>
      This is my weird 2008-style internet universe.
    </p>

    <div class="button blue">
      VIDEOS
    </div>

    <div class="button green">
      PROJECTS
    </div>

    <div class="button purple">
      DOWNLOADS
    </div>

    <div class="button red">
      RANDOM STUFF
    </div>

    <div class="player">

      <h2>NOW PLAYING</h2>

      <div class="bar">
        <div class="fill"></div>
      </div>

    </div>

    <div class="counter">
      Visitor #000420
    </div>

  </div>

  <div class="footer">
    © 2008 iLiam Corporation
  </div>

</body>

</html>
